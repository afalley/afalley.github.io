<!DOCTYPE html>
<html lang="en">
<head>

            margin: 0 0 1rem 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;

            font-weight: 300;
            font-size: 1.25rem;
